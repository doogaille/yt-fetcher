name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  checks:
    name: Checks (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile scripts
        run: python -m py_compile download_tracks.py transcode_sources.py

      - name: Smoke test no-transcode pipeline
        run: |
          python - << 'PY'
          import json
          from pathlib import Path
          import subprocess
          import sys

          sources = Path('tmp_sources')
          videos = sources / 'videos'
          videos.mkdir(parents=True, exist_ok=True)

          source_file = videos / 'Artiste Test - Titre Test.mp4'
          source_file.write_bytes(b'fake')

          index_payload = {
              'version': 1,
              'generated_at': '2026-03-01T00:00:00+00:00',
              'records': [
                  {
                      'track_key': 'artiste test::titre test',
                      'artist': 'Artiste Test',
                      'title': 'Titre Test',
                      'source_file': 'videos/Artiste Test - Titre Test.mp4',
                  }
              ],
          }
          (sources / 'index.json').write_text(json.dumps(index_payload), encoding='utf-8')

          command = [
              sys.executable,
              'transcode_sources.py',
              '--sources-dir', 'tmp_sources',
              '--output-dir', 'tmp_output',
              '--generate', 'video',
              '--no-transcode',
              '--skip-existing',
          ]
          subprocess.run(command, check=True)

          expected = [
              Path('tmp_output/videos/Artiste Test - Titre Test.mp4'),
          ]
          missing = [str(path) for path in expected if not path.exists()]
          if missing:
              raise SystemExit(f'Missing expected outputs: {missing}')
          print('Smoke outputs validated.')
          PY
